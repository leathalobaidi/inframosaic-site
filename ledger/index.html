<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>InfraMosaic — Publication Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1a2b; --navy2:#0f2940; --ink:#0e1c29; --paper:#fff; --bg:#eef1f4;
  --green:#13966b; --green-d:#0b6e4f; --green-br:#3fcf9a; --line:#dbe2e9;
  --muted:#5b6a78; --faint:#8696a4; --amber:#b9772a;
  --serif:"Fraunces",Georgia,serif; --sans:"Hanken Grotesk",system-ui,sans-serif; --mono:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:15px;line-height:1.55}
a{color:var(--green-d)}
code,.mono{font-family:var(--mono);font-size:12.5px}
.top{background:linear-gradient(160deg,#0a1a2b,#10314c);color:#eaf2f8;padding:26px 28px}
.top .wrap{max-width:1180px;margin:0 auto}
.brand{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--green-br);margin-bottom:10px}
.top h1{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:-.01em}
.top p{color:#b3c6d6;font-size:15px;margin-top:7px;max-width:760px}
.meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
.chip{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.06);border:1px solid #1d3b56;
      border-radius:7px;padding:6px 11px;color:#cfe0ee}
.chip b{color:#fff}
.chip .hash{color:var(--green-br)}
.vbtn{font-family:var(--sans);font-weight:600;font-size:13px;background:var(--green);color:#fff;border:none;
      border-radius:7px;padding:8px 14px;cursor:pointer}
.vbtn:hover{background:var(--green-br);color:var(--navy)}
#vstate{font-family:var(--mono);font-size:12.5px;padding:6px 0}

.wrap{max-width:1180px;margin:0 auto;padding:22px 28px}
.layout{display:grid;grid-template-columns:380px 1fr;gap:22px;align-items:start}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:14px}
.lhead{padding:14px 16px;border-bottom:1px solid var(--line)}
.tabs{display:flex;gap:6px;margin-bottom:10px}
.tab{font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:999px;cursor:pointer;background:#f0f3f6;color:var(--muted);border:1px solid transparent}
.tab.on{background:var(--green-d);color:#fff}
#search{width:100%;font-family:var(--sans);font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fbfcfd}
#search:focus{outline:none;border-color:var(--green)}
#list{max-height:62vh;overflow:auto}
.row{padding:10px 16px;border-bottom:1px solid #eef2f5;cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.row:hover{background:#f6faf8}
.row.sel{background:var(--green-br);background:#e7f7f0}
.row .fid{font-family:var(--mono);font-size:12px;color:var(--ink);word-break:break-all}
.row .val{font-family:var(--serif);font-weight:600;color:var(--green-d);white-space:nowrap;font-size:14px}
.row .lab{font-size:11.5px;color:var(--faint);display:block;margin-top:2px}

.detail{padding:22px 24px;min-height:62vh}
.detail .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--green-d)}
.detail h2{font-family:var(--serif);font-weight:600;font-size:34px;color:var(--ink);margin:6px 0 2px;letter-spacing:-.01em}
.detail .fid{font-family:var(--mono);font-size:13px;color:var(--muted);word-break:break-all}
.sec{margin-top:22px}
.sec h3{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
        border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec h3 .ic{color:var(--green)}
.kv{display:grid;grid-template-columns:140px 1fr;gap:6px 14px;font-size:13.5px}
.kv .k{color:var(--muted)}
.kv .v{color:var(--ink);word-break:break-word}
.inp{border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;background:#fbfcfd;font-size:13px}
.inp .src{font-family:var(--mono);font-size:12.5px;color:var(--ink);word-break:break-all}
.inp .sha{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:3px}
.badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
.b-ok{background:#e7f7f0;color:var(--green-d)} .b-rev{background:#eef3f8;color:#3a5d7a} .b-warn{background:#fdf3e3;color:var(--amber)}
.hash{font-family:var(--mono);font-size:12px;color:var(--muted);word-break:break-all}
.hash b{color:var(--green-d)}
.empty{color:var(--faint);font-size:15px;padding:40px 0;text-align:center}
@media(max-width:820px){.layout{grid-template-columns:1fr}#list{max-height:300px}}
</style>
</head>
<body>
<div class="top"><div class="wrap">
  <div class="brand">InfraMosaic · provenance</div>
  <h1>Publication Ledger</h1>
  <p>Every published number and cited claim, bound to its evidence, its methodology version, its QA result and its approval — hash-chained so any retroactive edit is detectable.</p>
  <div class="meta" id="meta"></div>
</div></div>

<div class="wrap"><div class="layout">
  <div class="panel">
    <div class="lhead">
      <div class="tabs" id="tabs"></div>
      <input id="search" placeholder="Search a figure, company or claim…">
    </div>
    <div id="list"></div>
  </div>
  <div class="panel"><div class="detail" id="detail"><div class="empty">Select a figure to see exactly how it was produced.</div></div></div>
</div></div>

<script>
let DATA=null, KIND='all', Q='';
const $=s=>document.querySelector(s);
const shorth=h=>h?h.slice(0,10)+'…'+h.slice(-6):'—';
const kindOf=r=>r.figure_id.split('.')[0];

fetch('./publication_ledger.json').then(r=>r.json()).then(d=>{
  DATA=d;
  $('#meta').innerHTML=
    `<span class="chip"><b>${d.n_records}</b> published figures</span>`+
    `<span class="chip">as of <b>${d.as_of}</b></span>`+
    `<span class="chip">chain head <span class="hash">${shorth(d.chain_head)}</span></span>`+
    `<button class="vbtn" onclick="verify()">Verify chain linkage</button>`+
    `<span id="vstate"></span>`;
  const kinds=['all',...[...new Set(d.records.map(kindOf))]];
  $('#tabs').innerHTML=kinds.map(k=>`<span class="tab${k==='all'?' on':''}" data-k="${k}">${k}</span>`).join('');
  $('#tabs').querySelectorAll('.tab').forEach(t=>t.onclick=()=>{KIND=t.dataset.k;
    $('#tabs').querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));render();});
  $('#search').oninput=e=>{Q=e.target.value.toLowerCase();render();};
  render();
}).catch(e=>{$('#detail').innerHTML='<div class="empty">Could not load the ledger. Serve over http.</div>';});

function render(){
  const rows=DATA.records.filter(r=>(KIND==='all'||kindOf(r)===KIND) &&
    (!Q || r.figure_id.toLowerCase().includes(Q) || (r.label||'').toLowerCase().includes(Q)));
  $('#list').innerHTML=rows.slice(0,400).map((r,i)=>{
    const gi=DATA.records.indexOf(r);
    return `<div class="row" data-i="${gi}"><div><span class="fid">${r.figure_id}</span>
      <span class="lab">${r.label||''}</span></div><span class="val">${fmt(r.value)}</span></div>`;
  }).join('')||'<div class="empty">No matches.</div>';
  $('#list').querySelectorAll('.row').forEach(el=>el.onclick=()=>show(+el.dataset.i,el));
}
function fmt(v){return typeof v==='number'?v.toLocaleString():String(v);}

function show(i,el){
  $('#list').querySelectorAll('.row').forEach(x=>x.classList.remove('sel'));
  if(el)el.classList.add('sel');
  const r=DATA.records[i], m=r.methodology, q=r.qa, a=r.approval;
  const inputs=r.inputs.map(x=>{
    const s=x.source||'';
    const link=s.startsWith('http')?`<a href="${s}" target="_blank" rel="noopener">${s}</a>`:`<span class="src">${s}</span>`;
    const sha=x.sha256?`<div class="sha">sha256 ${shorth(x.sha256)}</div>`:(x.extractor_sha256?`<div class="sha">via ${x.via} · sha256 ${shorth(x.extractor_sha256)}</div>`:'');
    return `<div class="inp"><div class="src">${link}</div>${sha}</div>`;
  }).join('');
  const apClass=a.status==='approved'?'b-ok':'b-rev';
  $('#detail').innerHTML=`
    <div class="eyebrow">${r.label||kindOf(r)}</div>
    <h2>${fmt(r.value)} <span style="font-family:var(--sans);font-size:15px;color:var(--muted);font-weight:500">${r.unit||''}</span></h2>
    <div class="fid">${r.figure_id} · as of ${r.as_of}</div>
    <div class="sec"><h3><span class="ic">◆</span> Evidence — what this number is built on</h3>${inputs}</div>
    <div class="sec"><h3><span class="ic">◆</span> Methodology</h3>
      <div class="kv">
        <span class="k">Formula</span><span class="v mono">${m.formula_ref}</span>
        <span class="k">Build commit</span><span class="v mono">${m.build_commit.slice(0,12)}</span>
        <span class="k">Engine sha256</span><span class="v mono">${shorth(m.build_database_sha256)}</span>
      </div></div>
    <div class="sec"><h3><span class="ic">◆</span> Quality assurance</h3>
      <div class="kv">
        <span class="k">Test suite</span><span class="v"><span class="badge ${q.tests_failed?'b-warn':'b-ok'}">${q.tests_passed}/${(q.tests_passed||0)+(q.tests_failed||0)} passed</span></span>
        <span class="k">Suite sha256</span><span class="v mono">${shorth(q.suite_sha256)}</span>
        <span class="k">Assurance</span><span class="v mono">${q.aqua_ref}</span>
      </div></div>
    <div class="sec"><h3><span class="ic">◆</span> Approval</h3>
      <div class="kv">
        <span class="k">Status</span><span class="v"><span class="badge ${apClass}">${a.status}</span></span>
        <span class="k">By</span><span class="v">${a.by}</span>
        <span class="k">Date</span><span class="v">${a.date}</span>
      </div></div>
    <div class="sec"><h3><span class="ic">◆</span> Chain position #${i}</h3>
      <div class="hash">prev&nbsp; ${r.prev_hash}</div>
      <div class="hash" style="margin-top:5px">this&nbsp; <b>${r.content_hash}</b></div></div>`;
}

function verify(){
  // structural linkage audit: each prev_hash must equal the previous content_hash,
  // and the final content_hash must equal the recorded chain head.
  const rs=DATA.records; let ok=true, where='';
  let prev='0'.repeat(64);
  for(let i=0;i<rs.length;i++){
    if(rs[i].prev_hash!==prev){ok=false;where=`record #${i} (${rs[i].figure_id})`;break;}
    prev=rs[i].content_hash;
  }
  if(ok && prev!==DATA.chain_head){ok=false;where='chain head';}
  $('#vstate').innerHTML=ok
    ? `<span style="color:#0b6e4f">✓ chain linkage intact — ${rs.length} records, head ${shorth(DATA.chain_head)}</span>`
    : `<span style="color:#b3261e">✗ chain broken at ${where}</span>`;
  $('#vstate').title='Full cryptographic re-hash: python3 build/build_ledger.py --verify';
}
</script>
</body>
</html>
